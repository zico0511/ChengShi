<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>快速找房 - 誠石不動產</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .search-section { margin-top:90px; padding:var(--spacing-2xl); background:#fff; border-radius:var(--border-radius-2xl); box-shadow:var(--shadow-md); }
    .search-title { text-align:center; margin-bottom:var(--spacing-xl); font-size:1.5rem; }
    .filter-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap:var(--spacing-lg); margin-bottom:var(--spacing-xl); }
    .form-group { display:flex; flex-direction:column; gap:0.4rem; }
    .form-label { font-size:0.9rem; font-weight:500; }
    .form-select, .form-input { padding:0.75rem 1rem; border:1px solid var(--color-light-gray); border-radius:var(--border-radius-lg); font-size:0.95rem; background:#fff; width:100%; }
    .multiselect { position:relative; width:100%; }
    .multiselect-btn { width:100%; padding:0.75rem 1rem; background:#fff; border:1px solid var(--color-light-gray); border-radius:var(--border-radius-lg); text-align:left; font-size:0.95rem; cursor:pointer; }
    .multiselect-list { position:absolute; top:100%; left:0; right:0; background:#fff; border:1px solid var(--color-light-gray); border-radius:var(--border-radius-lg); padding:0.5rem; display:none; z-index:999; }
    .multiselect-list.show { display:block; }
    .multiselect-item { display:flex; align-items:center; gap:6px; padding:5px 0; font-size:0.9rem; cursor:pointer; }
    .btn-search { width:100%; padding:1rem; background:linear-gradient(135deg,var(--color-primary),var(--color-primary-light)); color:#fff; border:none; border-radius:var(--border-radius-lg); font-size:1rem; font-weight:bold; cursor:pointer; }
    .btn { padding:0.75rem 1.5rem; border-radius:var(--border-radius-lg); font-weight:600; cursor:pointer; transition:all 0.2s; border:none; }
    .btn-outline { background:transparent; border:1px solid var(--color-primary); color:var(--color-primary); }
    .btn-outline:hover { background:var(--color-primary); color:#fff; }
    
    .house-list { margin:30px 0; display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:20px; }
    .house-card { background:#fff; padding:0; border-radius:12px; box-shadow:var(--shadow-md); cursor:pointer; overflow:hidden; transition: transform 0.2s; }
    .house-card:hover { transform: translateY(-5px); }
    .house-img { width:100%; height:180px; object-fit:cover; cursor:pointer; }
    .house-body { padding:20px; }
    .house-title { font-size:1rem; font-weight:bold; margin-bottom:8px; }
    .house-info { font-size:0.9rem; color:var(--color-text); line-height:1.6; }
    .house-feature { color:var(--color-primary); font-weight:500; margin-top:6px; }
    .no-data { text-align:center; padding:40px 20px; color:var(--color-text-light); }

    .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); display:none; align-items:center; justify-content:center; z-index:9999; }
    .modal-content { background:#fff; max-width:700px; width:90%; border-radius:16px; padding:25px; max-height:90vh; overflow-y:auto; position: relative; }
    .modal-close { padding:8px 16px; background:#e53e3e; color:#fff; border:none; border-radius:8px; cursor:pointer; position: sticky; top: 0; float: right; z-index: 10; }
    .modal-desc { white-space:pre-wrap; line-height:1.8; margin-top:10px; background: #f8f9fa; padding: 15px; border-radius: 8px; border-left: 4px solid var(--color-primary); }
    .modal-photos { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px; margin-top: 10px; }
    .modal-photos img { width:100px; height:100px; object-fit:cover; border-radius:8px; cursor:pointer; border: 1px solid #eee; }
    .modal-video video { max-width:100%; border-radius:8px; margin:15px 0; background: #000; display: block; }
    .map-link { color:#007bff; text-decoration:underline; cursor:pointer; font-weight: 500; }
    .map-link:hover { color: #0056b3; }

    .footer { background:#2d3748; color:#fff; padding:30px 20px; text-align:center; margin-top:40px; }
    .footer p { margin:4px 0; font-size:0.9rem; }
  </style>
</head>

<body>

<div class="img-preview" id="imgPreview">
  <span class="close" onclick="closeImgPreview()">&times;</span>
  <div class="nav-btn prev-btn" onclick="event.stopPropagation(); changeImg(-1)">&#10094;</div>
  <div class="img-preview-container" onclick="event.stopPropagation()">
    <div class="spinner" id="imgSpinner"></div>
    <img id="previewImg" src="" class="loading">
  </div>
  <div class="nav-btn next-btn" onclick="event.stopPropagation(); changeImg(1)">&#10095;</div>
</div>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="navbar-brand">誠石不動產</a>
    <div onclick="event.stopPropagation()">
      <a href="index.html" class="back-btn">← 回首頁</a>
    </div>
  </div>
</nav>

<section class="container">
  <div class="search-section">
    <h2 class="search-title">🔍 台中專業租屋搜尋</h2>
    <div class="filter-grid">
      <div class="form-group">
        <label class="form-label">區域</label>
        <select id="area" class="form-select">
          <option value="">不限</option>
          <option>中區</option><option>東區</option><option>南區</option><option>西區</option><option>北區</option>
          <option>北屯區</option><option>西屯區</option><option>南屯區</option><option>沙鹿區</option><option>清水區</option>
          <option>梧棲區</option><option>烏日區</option><option>大雅區</option><option>潭子區</option><option>太平區</option>
          <option>大里區</option><option>霧峰區</option><option>龍井區</option><option>其他</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">租金預算</label>
        <select id="priceRange" class="form-select">
          <option value="">不限</option>
          <option>10000以內</option>
          <option>10000-20000</option>
          <option>20000-30000</option>
          <option>30000-50000</option>
          <option>50000以上</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">自訂租金</label>
        <input id="customPrice" class="form-input" placeholder="例：13000-15000">
      </div>

      <div class="form-group">
        <label class="form-label">房屋型態</label>
        <select id="type" class="form-select">
          <option value="">不限</option>
          <option>獨立套房</option><option>整層住家</option><option>整棟透天</option><option>店面</option><option>廠房</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">房型</label>
        <select id="room" class="form-select">
          <option value="">不限</option>
          <option>1房</option><option>2房</option><option>3房</option><option>4房</option><option>4房以上</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">車位</label>
        <select id="park" class="form-select">
          <option value="">不限</option>
          <option>平面車位</option><option>機械車位</option><option>機車車位</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">特色條件</label>
        <div class="multiselect">
          <button type="button" class="multiselect-btn" id="multiBtn">請選擇</button>
          <div class="multiselect-list" id="multiList">
            <label class="multiselect-item"><input type="checkbox" value="可貓">可貓</label>
            <label class="multiselect-item"><input type="checkbox" value="可狗">可狗</label>
            <label class="multiselect-item"><input type="checkbox" value="電梯">電梯</label>
            <label class="multiselect-item"><input type="checkbox" value="可租補">可租補</label>
          </div>
        </div>
      </div>
    </div>

    <div style="display: flex; gap: 10px; margin-top: 1rem;">
      <button class="btn-search" id="searchBtn" style="flex: 2;">🔍 立即搜尋房源</button>
      <button class="btn btn-outline" id="clearBtn" style="flex: 1; height: auto;">重置條件</button>
    </div>
  </div>

  <div id="houseList" class="house-list"></div>
  <div id="pagination" style="text-align: center; margin: 2rem 0; display: none;">
    <button id="loadMoreBtn" class="btn btn-outline" style="padding: 0.8rem 2rem;">載入更多房源</button>
  </div>
</section>

<div class="modal" id="detailModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">關閉</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer class="footer">
  <p>誠石不動產｜專營台中租賃服務</p>
  <p>📞 <a href="tel:0908788922" style="color: inherit; text-decoration: none;">0908-788-922</a></p>
  <p>📍臺中市沙鹿區向上路六段736號1樓</p>
</footer>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script src="shared.js"></script>

  <script>
    const multiBtn = document.getElementById('multiBtn');
    const multiList = document.getElementById('multiList');
    const checkboxes = multiList.querySelectorAll('input');

    multiBtn.addEventListener('click', (e) => { e.stopPropagation(); multiList.classList.toggle('show'); });
    checkboxes.forEach(cb => cb.addEventListener('change', updateMultiText));
    function updateMultiText() {
      const selected = Array.from(checkboxes).filter(c => c.checked).map(c => c.value);
      multiBtn.textContent = selected.length ? selected.join('、') : '請選擇';
    }
    window.addEventListener('click', () => multiList.classList.remove('show'));
    multiList.addEventListener('click', e => e.stopPropagation());

    // --- 搜尋記憶功能 ---
    function saveSearchFilters() {
      const filters = {
        area: document.getElementById('area').value,
        priceRange: document.getElementById('priceRange').value,
        customPrice: document.getElementById('customPrice').value,
        type: document.getElementById('type').value,
        room: document.getElementById('room').value,
        park: document.getElementById('park').value,
        features: getSelectedFeatures()
      };
      sessionStorage.setItem('rental_search_filters', JSON.stringify(filters));
    }

    function loadSearchFilters() {
      const saved = sessionStorage.getItem('rental_search_filters');
      if (saved) {
        const filters = JSON.parse(saved);
        document.getElementById('area').value = filters.area || '';
        document.getElementById('priceRange').value = filters.priceRange || '';
        document.getElementById('customPrice').value = filters.customPrice || '';
        document.getElementById('type').value = filters.type || '';
        document.getElementById('room').value = filters.room || '';
        document.getElementById('park').value = filters.park || '';
        
        checkboxes.forEach(cb => {
          cb.checked = (filters.features || []).includes(cb.value);
        });
        updateMultiText();
      }
    }

    // --- 分頁與效能優化 ---
    let allFilteredHouses = [];
    let currentPage = 1;
    const pageSize = 6; // 每頁顯示 6 筆

    async function getHouses() { 
      try {
        if (!window.db) {
          console.warn("資料庫未就緒，等待中...");
          await new Promise(resolve => setTimeout(resolve, 500));
          return getHouses();
        }
        
        // 獲取所有房源
        const snapshot = await window.db.collection('houses').get();
        return snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))
          .sort((a, b) => {
            // 處理不同的時間格式
            const dateA = a.createdAt?.toDate ? a.createdAt.toDate() : (a.createdAt instanceof Date ? a.createdAt : new Date(0));
            const dateB = b.createdAt?.toDate ? b.createdAt.toDate() : (b.createdAt instanceof Date ? b.createdAt : new Date(0));
            return dateB - dateA;
          });
      } catch (err) {
        console.error("讀取房源失敗:", err);
        return [];
      }
    }

  function getSelectedFeatures() { 
    if (typeof checkboxes === 'undefined' || !checkboxes) return [];
    return Array.from(checkboxes).filter(c => c.checked).map(c => c.value); 
  }

  function showDetailByIndex(index) {
    const house = allFilteredHouses[index];
    if (house) {
      if (typeof showDetail === 'function') {
        showDetail(house);
      } else {
        console.error("showDetail function not found in shared.js");
      }
    }
  }

  async function performSearch(isInitial = false) {
    const listEl = document.getElementById('houseList');
    if (!listEl) return;
    
    if (isInitial) {
      listEl.innerHTML = '<div class="no-data">正在從雲端載入房源...</div>';
    }
    
    saveSearchFilters(); 
    const houses = await getHouses();

    // 確保表單元素存在
    const areaEl = document.getElementById('area');
    const priceRangeEl = document.getElementById('priceRange');
    const customPriceEl = document.getElementById('customPrice');
    const typeEl = document.getElementById('type');
    const roomEl = document.getElementById('room');
    const parkEl = document.getElementById('park');

    if (!areaEl || !priceRangeEl || !customPriceEl || !typeEl || !roomEl || !parkEl) {
      console.error("部分搜尋表單元素未找到");
      return;
    }

    const area = areaEl.value;
    const priceRange = priceRangeEl.value;
    const customPrice = customPriceEl.value.trim();
    const type = typeEl.value;
    const room = roomEl.value;
    const park = parkEl.value;
    const features = getSelectedFeatures();

    allFilteredHouses = houses.filter(h => {
      const price = parseInt(h.price) || 0;
      if (area && h.area !== area) return false;
      if (type && h.type !== type) return false;
      if (room && h.room !== room) return false;
      if (park && h.park !== park) return false;

      if (features.length > 0) {
        for (const f of features) {
          if (f === '可貓') {
            if (h.pet !== '可貓' && h.pet !== '可貓狗') return false;
          } else if (f === '可狗') {
            if (h.pet !== '可狗' && h.pet !== '可貓狗') return false;
          } else if (f === '電梯') {
            if (h.elevator !== '有') return false;
          } else if (f === '可租補') {
            if (h.subsidy !== '可') return false;
          }
        }
      }

      if (customPrice.includes('-')) {
        const [min, max] = customPrice.split('-').map(Number);
        return price >= min && price <= max;
      }
      if (customPrice) return price >= Number(customPrice);

      switch (priceRange) {
        case '10000以內': return price <= 10000;
        case '10000-20000': return price >= 10000 && price <= 20000;
        case '20000-30000': return price >= 20000 && price <= 30000;
        case '30000-50000': return price >= 30000 && price <= 50000;
        case '50000以上': return price >= 50000;
        default: return true;
      }
    });

    currentPage = 1;
    renderHousePage();
  }

  function renderHousePage() {
    const listEl = document.getElementById('houseList');
    const paginationEl = document.getElementById('pagination');
    if (!listEl || !paginationEl) return;
    
    const end = currentPage * pageSize;
    const housesToDisplay = allFilteredHouses.slice(0, end);

    if (housesToDisplay.length === 0) {
      listEl.innerHTML = '<div class="no-data">目前尚無符合條件的房源</div>';
      paginationEl.style.display = 'none';
      return;
    }

    listEl.innerHTML = housesToDisplay.map((h, index) => {
      const photoListJson = JSON.stringify(h.photos || []).replace(/'/g, "&#39;");
      const mainPhoto = (h.photos && h.photos[0]) || '';
      
      let tags = [];
      if (h.pet === '可貓' || h.pet === '可貓狗') tags.push('可貓');
      if (h.pet === '可狗' || h.pet === '可貓狗') tags.push('可狗');
      if (h.elevator === '有') tags.push('電梯');
      if (h.subsidy === '可') tags.push('可租補');
      const tagsHtml = tags.length > 0 ? tags.map(t => `#${t}`).join(' ') : '';

      return `
        <div class="house-card" onclick="showDetailByIndex(${index})">
          ${mainPhoto ? 
            `<img src="${mainPhoto}" class="house-img" loading="lazy" onclick='event.stopPropagation(); openImgPreview("${mainPhoto}", ${photoListJson})'>` 
            : '<div style="height:180px;background:#eee;display:flex;align-items:center;justify-content:center;color:#999;">無照片</div>'}
          <div class="house-body">
            <div class="house-title">${h.title}</div>
            <div class="house-info">${h.area}｜${h.price} 元<br>${h.type}｜${h.room}</div>
            <div class="house-info">樓層：${h.floor || '未填'}</div>
            <div class="house-feature">${tagsHtml}</div>
          </div>
        </div>
      `;
    }).join('');

    if (end < allFilteredHouses.length) {
      paginationEl.style.display = 'block';
    } else {
      paginationEl.style.display = 'none';
    }
  }

  // 事件監聽
  const loadMoreBtn = document.getElementById('loadMoreBtn');
  if (loadMoreBtn) {
    loadMoreBtn.addEventListener('click', () => {
      currentPage++;
      renderHousePage();
    });
  }

  const searchBtn = document.getElementById('searchBtn');
  if (searchBtn) {
    searchBtn.addEventListener('click', () => performSearch());
  }

  const clearBtn = document.getElementById('clearBtn');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      document.getElementById('area').value = '';
      document.getElementById('priceRange').value = '';
      document.getElementById('customPrice').value = '';
      document.getElementById('type').value = '';
      document.getElementById('room').value = '';
      document.getElementById('park').value = '';
      if (typeof checkboxes !== 'undefined') checkboxes.forEach(cb => cb.checked = false);
      updateMultiText();
      sessionStorage.removeItem('rental_search_filters');
      performSearch();
    });
  }

  window.onload = () => {
    loadSearchFilters();
    performSearch(true);
  };

  window.onclick = function(event) {
    const modal = document.getElementById('detailModal');
    if (event.target == modal) {
      if (typeof closeModal === 'function') closeModal();
    }
  };
  </script>
</body>
</html>
