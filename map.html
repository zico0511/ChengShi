<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>地圖找房 - 誠石不動產</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  
  <!-- Leaflet CSS (完全免費，免 API Key) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
  
  <style>
    body { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    .navbar { position: relative; background: #fff !important; box-shadow: var(--shadow-md); padding: 0.8rem 0; }
    .navbar-brand, .navbar-link { color: var(--color-primary) !important; }
    .navbar.scrolled .navbar-link { color: var(--color-text) !important; }
    
    .map-container { flex: 1; display: flex; position: relative; overflow: hidden; }
    #map { width: 100%; height: 100%; z-index: 1; }
    
    .filter-sidebar { 
      position: absolute; top: 20px; left: 20px; z-index: 1000; 
      width: 350px; background: rgba(255, 255, 255, 0.95); 
      padding: var(--spacing-lg); border-radius: var(--border-radius-xl); 
      box-shadow: var(--shadow-xl); max-height: calc(100% - 40px); overflow-y: auto;
      backdrop-filter: blur(10px); transition: transform 0.3s ease;
    }
    
    .filter-sidebar.collapsed { transform: translateX(-370px); }
    .filter-toggle {
      position: absolute; top: 20px; left: 20px; z-index: 1001;
      background: var(--color-primary); color: #fff; border: none;
      padding: 10px 15px; border-radius: 8px; cursor: pointer;
      box-shadow: var(--shadow-md); display: none;
    }

    .search-title { font-size: 1.2rem; margin-bottom: var(--spacing-md); font-weight: 700; color: var(--color-primary); }
    .form-group { margin-bottom: var(--spacing-md); }
    .form-label { font-size: 0.85rem; font-weight: 600; margin-bottom: 4px; display: block; }
    .form-select, .form-input { padding: 0.6rem; border: 1px solid var(--color-light-gray); border-radius: 6px; font-size: 0.9rem; width: 100%; }
    
    .multiselect { position: relative; width: 100%; }
    .multiselect-btn { width: 100%; padding: 0.6rem; background: #fff; border: 1px solid var(--color-light-gray); border-radius: 6px; text-align: left; font-size: 0.9rem; cursor: pointer; }
    .multiselect-list { position: absolute; top: 100%; left: 0; right: 0; background: #fff; border: 1px solid var(--color-light-gray); border-radius: 6px; padding: 0.5rem; display: none; z-index: 1001; box-shadow: var(--shadow-lg); }
    .multiselect-list.show { display: block; }
    .multiselect-item { display: flex; align-items: center; gap: 6px; padding: 4px 0; font-size: 0.85rem; cursor: pointer; }
    
    .btn-search { width: 100%; padding: 0.8rem; background: var(--color-primary); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; }
    .btn-clear { width: 100%; padding: 0.6rem; background: transparent; color: var(--color-text-light); border: 1px solid var(--color-light-gray); border-radius: 8px; font-size: 0.85rem; cursor: pointer; margin-top: 8px; }

    /* Leaflet Marker Style (移至 shared.css) */

    .search-address-group { margin-bottom: var(--spacing-md); position: relative; }
    .search-address-input { 
      padding: 0.8rem 1rem 0.8rem 2.5rem; border: 2px solid var(--color-primary); 
      border-radius: 12px; font-size: 0.95rem; width: 100%; outline: none;
      transition: all 0.2s; box-shadow: var(--shadow-md);
    }
    .search-address-input:focus { box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2); }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--color-primary); font-size: 1.1rem; }

    .popup-card { width: 220px; cursor: pointer; padding: 5px; }
    .popup-img { width: 100%; height: 120px; object-fit: cover; border-radius: 8px; margin-bottom: 8px; }
    .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; color: var(--color-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .popup-price { color: var(--color-danger); font-weight: 700; font-size: 16px; margin-bottom: 2px; }
    .popup-info { font-size: 12px; color: var(--color-text-light); }

    @media (max-width: 768px) {
      .filter-sidebar { width: 90%; left: 5%; bottom: 20px; top: auto; max-height: 50%; }
      .filter-sidebar.collapsed { transform: translateY(110%); }
      .filter-toggle { display: block; bottom: 20px; top: auto; }
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="index.html" class="navbar-brand">誠石不動產</a>
    <ul class="navbar-links">
      <li><a href="index.html" class="navbar-link">首頁</a></li>

    <button class="btn btn-outline" onclick="openContactModal()">聯繫我們</button>

  </div>
</nav>

<div class="map-container">
  <button class="filter-toggle" id="toggleFilter">🔍 篩選條件</button>
  <div class="filter-sidebar" id="filterSidebar">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
      <h2 class="search-title">🔍 地圖找房</h2>
      <button id="closeFilter" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--color-text-light); display: none;">✕</button>
    </div>

    <div class="search-address-group">
      <span class="search-icon">🔍</span>
      <input type="text" id="addressSearch" class="search-address-input" placeholder="請輸入地址 (例如：西屯區台灣大道...)" onkeypress="if(event.key==='Enter') searchAddress()">
      <button onclick="searchAddress()" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: var(--color-primary); color: #fff; border: none; padding: 5px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem;">搜尋</button>
    </div>
    
    <div class="form-group">
      <label class="form-label">行政區</label>
      <select id="area" class="form-select">
        <option value="">不限區域</option>
        <option>中區</option><option>東區</option><option>南區</option><option>西區</option><option>北區</option>
        <option>北屯區</option><option>西屯區</option><option>南屯區</option><option>沙鹿區</option><option>清水區</option>
        <option>梧棲區</option><option>烏日區</option><option>大雅區</option><option>潭子區</option><option>太平區</option>
        <option>大里區</option><option>霧峰區</option><option>龍井區</option><option>其他</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">租金預算</label>
      <select id="priceRange" class="form-select">
        <option value="">不限</option>
        <option>10000以內</option>
        <option>10000-20000</option>
        <option>20000-30000</option>
        <option>30000-50000</option>
        <option>50000以上</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">房屋型態</label>
      <select id="type" class="form-select">
        <option value="">不限</option>
        <option>獨立套房</option><option>整層住家</option><option>整棟透天</option><option>店面</option><option>廠房</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">房型</label>
      <select id="room" class="form-select">
        <option value="">不限</option>
        <option>1房</option><option>2房</option><option>3房</option><option>4房</option><option>4房以上</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">特色條件</label>
      <div class="multiselect">
        <button type="button" class="multiselect-btn" id="multiBtn">請選擇</button>
        <div class="multiselect-list" id="multiList">
          <label class="multiselect-item"><input type="checkbox" value="可貓">可貓</label>
          <label class="multiselect-item"><input type="checkbox" value="可狗">可狗</label>
          <label class="multiselect-item"><input type="checkbox" value="電梯">電梯</label>
          <label class="multiselect-item"><input type="checkbox" value="可租補">可租補</label>
        </div>
      </div>
    </div>

    <button class="btn-search" id="searchBtn">立即搜尋</button>
    <button class="btn-clear" id="clearBtn">重置條件</button>
    
    <div id="resultsInfo" style="margin-top: 15px; font-size: 0.85rem; color: var(--color-text-light); text-align: center;">
      正在載入房源數據...
    </div>
  </div>
  
  <div id="map"></div>
</div>

<!-- 詳情彈窗 -->
<div class="modal" id="detailModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">關閉</button>
    <div id="modalContent"></div>

</div>

<!-- Scripts -->
<!-- Leaflet JS (完全免費，不需要 API Key) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="shared.js"></script>

<script>
  let map;
  let markers = [];
  let allHouses = [];
  let userMarker; // 用於標記搜尋的地點
  
  // 台中中心點
  const TAICHUNG_CENTER = [24.1477, 120.6736];
  
  // 初始化地圖
  function initMap() {
    map = L.map('map', {
      zoomControl: false
    }).setView(TAICHUNG_CENTER, 13);
    
    L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
      subdomains: 'abcd',
      maxZoom: 20
    }).addTo(map);
    
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    
    loadHouses();
  }

  // 行政區經緯度對照表
  const AREA_COORDS = {
    '中區': [24.1424, 120.6806],
    '東區': [24.1367, 120.6974],
    '南區': [24.1198, 120.6657],
    '西區': [24.1444, 120.6631],
    '北區': [24.1620, 120.6823],
    '北屯區': [24.1878, 120.6961],
    '西屯區': [24.1738, 120.6406],
    '南屯區': [24.1386, 120.6276],
    '沙鹿區': [24.2346, 120.5583],
    '清水區': [24.2685, 120.5487],
    '梧棲區': [24.2547, 120.5312],
    '烏日區': [24.1082, 120.6231],
    '大雅區': [24.2294, 120.6477],
    '潭子區': [24.2123, 120.7061],
    '太平區': [24.1278, 120.7136],
    '大里區': [24.1023, 120.6826],
    '霧峰區': [24.0620, 120.6991],
    '龍井區': [24.2231, 120.5463]
  };

  // 地址搜尋功能
  async function searchAddress() {
    const query = document.getElementById('addressSearch').value;
    if (!query) return;
    
    document.getElementById('resultsInfo').textContent = "正在搜尋地點...";
    
    try {
      // 搜尋時先清空行政區篩選，以便搜尋結果不受限於區域
      document.getElementById('area').value = "";
      
      const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=1`);
      const data = await response.json();
      
      if (data && data.length > 0) {
        const lat = parseFloat(data[0].lat);
        const lon = parseFloat(data[0].lon);
        const pos = [lat, lon];
        
        map.flyTo(pos, 17, {
          duration: 1.5,
          easeLinearity: 0.25
        });
        
        // 標記搜尋點
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker(pos, {
          icon: L.divIcon({
            html: '<div style="background: #e53e3e; width: 15px; height: 15px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 10px rgba(0,0,0,0.5);"></div>',
            className: 'user-marker',
            iconSize: [15, 15],
            iconAnchor: [7, 7]
          })
        }).addTo(map).bindPopup(`<b>您搜尋的地點：</b><br>${query}`).openPopup();
        
        // 自動執行一次搜尋以確保顯示房源
        performSearch();
        
        document.getElementById('resultsInfo').textContent = "已定位到地址，您可以查看附近的房源";
      } else {
        alert("找不到該地址，請嘗試更詳細的名稱（例如：台中市西屯區...）");
        document.getElementById('resultsInfo').textContent = "找不到地址";
      }
    } catch (e) {
      console.error(e);
      document.getElementById('resultsInfo').textContent = "搜尋出錯";
    }
  }

  async function geocodeAddress(house) {
    if (house.lat && house.lng) return [house.lat, house.lng];
    
    // 簡單模擬：使用行政區中心點並加入隨機偏移
    const base = AREA_COORDS[house.area] || TAICHUNG_CENTER;
    return [
      base[0] + (Math.random() - 0.5) * 0.01,
      base[1] + (Math.random() - 0.5) * 0.01
    ];
  }

  async function loadHouses() {
    try {
      if (!window.db) {
        setTimeout(loadHouses, 500);
        return;
      }
      const snapshot = await window.db.collection('houses').get();
      allHouses = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      performSearch();
    } catch (err) {
      console.error("Load failed:", err);
      document.getElementById('resultsInfo').textContent = "載入失敗";
    }
  }

  function clearMarkers() {
    markers.forEach(m => map.removeLayer(m));
    markers = [];
  }

  async function performSearch() {
    const area = document.getElementById('area').value;
    const priceRange = document.getElementById('priceRange').value;
    const type = document.getElementById('type').value;
    const room = document.getElementById('room').value;
    const features = Array.from(document.querySelectorAll('#multiList input:checked')).map(c => c.value);

    const filtered = allHouses.filter(h => {
      const price = parseInt(h.price) || 0;
      if (area && h.area !== area) return false;
      if (type && h.type !== type) return false;
      if (room && h.room !== room) return false;
      if (features.length > 0) {
        for (const f of features) {
          if (f === '可貓' && (h.pet !== '可貓' && h.pet !== '可貓狗')) return false;
          if (f === '可狗' && (h.pet !== '可狗' && h.pet !== '可貓狗')) return false;
          if (f === '電梯' && h.elevator !== '有') return false;
          if (f === '可租補' && h.subsidy !== '可') return false;
        }
      }
      switch (priceRange) {
        case '10000以內': return price <= 10000;
        case '10000-20000': return price >= 10000 && price <= 20000;
        case '20000-30000': return price >= 20000 && price <= 30000;
        case '30000-50000': return price >= 30000 && price <= 50000;
        case '50000以上': return price >= 50000;
        default: return true;
      }
    });

    document.getElementById('resultsInfo').textContent = `找到 ${filtered.length} 筆房源`;
    clearMarkers();
    
    if (area && AREA_COORDS[area]) {
      map.flyTo(AREA_COORDS[area], 14);
    }

    for (const h of filtered) {
      const pos = await geocodeAddress(h);
      const priceLabel = h.price >= 10000 ? (h.price/10000).toFixed(1) + '萬' : h.price;
      
      const icon = L.divIcon({
        html: `<div class="custom-marker">${priceLabel}</div>`,
        className: 'custom-div-icon',
        iconSize: [0, 0], // 讓 CSS 控制大小
        iconAnchor: [0, 0] // 由 CSS transform: translate(-50%, -100%) 處理
      });

      const marker = L.marker(pos, { icon }).addTo(map);
      
      const popupContent = `
        <div class="popup-card" onclick="showDetailById('${h.id}')">
          <img src="${(h.photos && h.photos[0]) || 'https://via.placeholder.com/220x120?text=No+Photo'}" class="popup-img">
          <div class="popup-title">${h.title}</div>
          <div class="popup-price">${h.price} 元/月</div>
          <div class="popup-info">${h.area}｜${h.type}｜${h.room}</div>
          <div style="margin-top: 8px; font-size: 12px; color: var(--color-primary); font-weight: 700;">點擊查看詳情 →</div>
        </div>
      `;
      
      marker.bindPopup(popupContent, { maxWidth: 250 });
      markers.push(marker);
    }
  }

  function showDetailById(id) {
    const house = allHouses.find(h => h.id === id);
    if (house && typeof showDetail === 'function') {
      showDetail(house);
    }
  }

  // UI 交互
  const multiBtn = document.getElementById('multiBtn');
  const multiList = document.getElementById('multiList');
  multiBtn.addEventListener('click', (e) => { e.stopPropagation(); multiList.classList.toggle('show'); });
  window.addEventListener('click', () => multiList.classList.remove('show'));
  
  document.querySelectorAll('#multiList input').forEach(cb => {
    cb.addEventListener('change', () => {
      const selected = Array.from(document.querySelectorAll('#multiList input:checked')).map(c => c.value);
      multiBtn.textContent = selected.length ? selected.join('、') : '請選擇';
    });
  });

  document.getElementById('searchBtn').addEventListener('click', performSearch);
  document.getElementById('clearBtn').addEventListener('click', () => {
    document.getElementById('area').value = '';
    document.getElementById('priceRange').value = '';
    document.getElementById('type').value = '';
    document.getElementById('room').value = '';
    document.querySelectorAll('#multiList input').forEach(c => c.checked = false);
    multiBtn.textContent = '請選擇';
    performSearch();
  });

  const toggleBtn = document.getElementById('toggleFilter');
  const sidebar = document.getElementById('filterSidebar');
  toggleBtn.addEventListener('click', () => {
    sidebar.classList.toggle('collapsed');
    toggleBtn.textContent = sidebar.classList.contains('collapsed') ? '🔍 篩選條件' : '✕ 關閉篩選';
  });

  window.onload = () => {
    initMap();
    if (typeof initMobileMenu === 'function') initMobileMenu();
  };
</script>

</body>
</html>
